                - listitem [ref=f2e563]:
                  - strong [ref=f2e564]: Sol, for complex, open-ended work.
                  - text: Choose Sol for ambiguous, difficult, or high-value tasks that need extra analysis, judgment, or polish, such as complex code changes, deep research, or polished documents. For narrower tasks, define what done looks like to keep the work focused.
                - listitem [ref=f2e565]:
                  - strong [ref=f2e566]: Terra, the pragmatic all-rounder.
                  - text: Choose Terra for everyday work that needs strong reasoning and tool use when you do not need Sol’s full depth. It is a natural starting point for work you previously gave GPT-5.5.
                - listitem [ref=f2e567]:
                  - strong [ref=f2e568]: Luna, for clear, repeatable tasks.
                  - text: Choose Luna for specific, high-volume tasks when you know what a good result looks like, such as extraction, classification, transformation, and structured summaries.
