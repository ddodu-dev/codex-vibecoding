              - text: ", Work mode can also use local files, apps, and the browser when those tools are available."
            - paragraph [ref=f1e182]: If you have used Codex for non-coding work, you can stay in Codex or switch to Work mode. Work mode gives you the same core capabilities with an experience designed for everyday work.
